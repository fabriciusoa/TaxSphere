<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 64" fill="none">
  <!-- Brain-Circuit Icon -->
  <g transform="translate(0, 2) scale(0.75)">
    <!-- Left half - Circuit board side -->
    <path d="M40 8C25.1 8 13 20.1 13 35c0 11.2 6.8 20.8 16.5 24.9V68h5V59.3c2.1 0.5 4.3 0.7 6.5 0.7V8z" fill="#1a8a9e"/>
    <path d="M40 12C27.3 12 17 22.3 17 35c0 9.6 5.9 17.8 14.2 21.3V64h3.8V55.8c1.6 0.4 3.3 0.5 5 0.5V12z" fill="#22a5b5"/>
    
    <!-- Circuit lines on left -->
    <line x1="22" y1="28" x2="32" y2="28" stroke="#4dd8e8" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="22" y1="28" x2="22" y2="20" stroke="#4dd8e8" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="25" y1="35" x2="35" y2="35" stroke="#4dd8e8" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="22" y1="42" x2="32" y2="42" stroke="#4dd8e8" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="22" y1="42" x2="22" y2="50" stroke="#4dd8e8" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="28" y1="48" x2="36" y2="48" stroke="#4dd8e8" stroke-width="1.5" stroke-linecap="round"/>

    <!-- Circuit dots on left -->
    <circle cx="22" cy="20" r="2.5" fill="#ffffff"/>
    <circle cx="22" cy="50" r="2" fill="#4dd8e8"/>
    <circle cx="25" cy="35" r="1.5" fill="#4dd8e8"/>

    <!-- Right half - Brain side -->
    <path d="M40 8v52c2.2 0 4.4-0.2 6.5-0.7V59.3h0c4.5-1 8.6-3.2 11.8-6.3 4.8-4.6 7.7-11 7.7-18C66 20.1 53.9 8 40 8z" fill="#00c8f0"/>
    <path d="M40 12v44c1.7 0 3.4-0.2 5-0.5V55.8c3.8-0.9 7.3-2.8 10.1-5.4 4.1-3.9 6.6-9.4 6.6-15.4C61.7 22.3 52.3 12 40 12z" fill="#33d4f4"/>
    
    <!-- Brain folds on right -->
    <path d="M44 22c4 0 8 2.5 10 6" stroke="#0a1628" stroke-width="1.8" stroke-linecap="round" fill="none" opacity="0.25"/>
    <path d="M44 30c5 0 9 2 11 5" stroke="#0a1628" stroke-width="1.8" stroke-linecap="round" fill="none" opacity="0.25"/>
    <path d="M44 38c4 0 8 1.5 10 4" stroke="#0a1628" stroke-width="1.8" stroke-linecap="round" fill="none" opacity="0.25"/>
    <path d="M44 46c3 0 6 1 8 3" stroke="#0a1628" stroke-width="1.8" stroke-linecap="round" fill="none" opacity="0.25"/>

    <!-- Circuit connection dots on right edge -->
    <circle cx="58" cy="28" r="2" fill="#0a1628" opacity="0.3"/>
    <line x1="58" y1="28" x2="64" y2="28" stroke="#0a1628" stroke-width="1.2" stroke-linecap="round" opacity="0.3"/>
    <circle cx="64" cy="28" r="1.5" fill="#0a1628" opacity="0.3"/>
    
    <circle cx="60" cy="38" r="2" fill="#0a1628" opacity="0.3"/>
    <line x1="60" y1="38" x2="66" y2="38" stroke="#0a1628" stroke-width="1.2" stroke-linecap="round" opacity="0.3"/>
    <circle cx="66" cy="38" r="1.5" fill="#0a1628" opacity="0.3"/>

    <circle cx="56" cy="48" r="2" fill="#0a1628" opacity="0.3"/>
    <line x1="56" y1="48" x2="62" y2="48" stroke="#0a1628" stroke-width="1.2" stroke-linecap="round" opacity="0.3"/>
    <circle cx="62" cy="48" r="1.5" fill="#0a1628" opacity="0.3"/>
