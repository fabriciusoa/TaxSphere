  <!-- Text: Tax -->
  <text x="62" y="44" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="32" font-weight="800" fill="#FFFFFF" letter-spacing="-0.5">Tax</text>
  
  <!-- Text: Mind -->
  <text x="130" y="44" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="32" font-weight="700" fill="#00c8f0" letter-spacing="-0.5">Mind</text>
